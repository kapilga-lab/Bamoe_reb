#########
# Misc. #
#########

#spring.profiles.active=@spring.profiles.active@
#spring.profiles.default=dev

server.address=localhost
server.port=8080
server.servlet.context-path=
springdoc.swagger-ui.use-root-path=true

########
# CORS #
########

# Configure allowed CORS origin patterns. This is required for BAMOE Management Console to interact with the Business Service.
# You can specify multiple origins separated by commas, or use patterns with wildcards.
# Examples:
#   - Single origin: bamoe.cors.allowed-origin-patterns=https://example.com
#   - Multiple origins: bamoe.cors.allowed-origin-patterns=https://example.com,https://another.com
#   - Pattern with wildcard: bamoe.cors.allowed-origin-patterns=https://*.example.com
#   - All origins (default, not recommended for production): bamoe.cors.allowed-origin-patterns=*
#
# This property can also be set via the BAMOE_CORS_ALLOWED_ORIGIN_PATTERNS environment variable.
# CAUTION: The default value (*) allows all origins. Change it to allow only the desired origins before deploying to production.
bamoe.cors.allowed-origin-patterns=*

###############
# Persistence #
###############

# Apache KIE provides a separate Flyway subsystem that allows Kogito's and BAMOE's internal tables to be created and migrated
# without interfering with your own Flyway, if you're using it.
#
# This property enables running this isolated Flyway mechanism automatically when the Business Service starts.
# If you want more control over when/how/who executes changes to your database, disable it and run the SQL scripts manually.
kie.flyway.enabled=true

# Disabling Spring Boot Flyway to avoid unnecessary database initialization.
# The wrapper's own last_assignment table is created at startup by LastAssignmentStore
# (CREATE TABLE IF NOT EXISTS), independent of the Kogito kie.flyway subsystem.
spring.flyway.enabled=false

###########
# Wrapper #
###########

# External userDetails API used by the RANDOM_SELECT / TO_ALL_USER / CHOICE
# assignment strategies. Overridable per environment.
wrapper.user-details.url=http://localhost:9090/api/simulate/userDetails

# Default DS (Production)
spring.datasource.url=jdbc:oracle:thin:@//localhost:1521/XEPDB1
spring.datasource.username=bamoe
spring.datasource.password=bamoe
spring.datasource.hikari.maximum-pool-size=20

# Disabling Hibernate schema generation
spring.jpa.generate-ddl=false
spring.jpa.hibernate.ddl-auto=none

# Note: on Oracle, the bamoe-wrapper library auto-activates its orm-oracle.xml mapping
# override (BAMOE task_comment column fix) — no property needed here.

# Tells Kogito Persistence what kind of persistence is configured.
kogito.persistence.type=jdbc

# Enable optimistic locking
# This ensures that concurrent access to the same process instance is handled correctly. With optimistic locking
# enabled, concurrent updates of the same entity could result in an optimistic locking exception, which is then
# handled by the fault-tolerance retry logic. With optimist locking disabled, concurrent updates of the same
# entity can lead to data inconsistency.
kogito.persistence.optimistic.lock=true

############
# Services #
############

# These properties are residual from Distributed Architecture, where Data-Index, Data-Audit,
# and Jobs Service are external to the Business Service.
#
# They are still necessary but won't be anymore in future BAMOE releases.
kogito.service.url=http://${server.address}:${server.port}${server.servlet.context-path}
kogito.jobs-service.url=http://${server.address}:${server.port}${server.servlet.context-path}
kogito.data-index.url=http://${server.address}:${server.port}${server.servlet.context-path}

# Jobs Service configuration property to enable capture and propagation of failure information during job execution.
kogito.jobs-service.exception-details-enabled=false

############
# Security #
############

# To enable security for this Business Service, follow these steps:
#
# 1. Set "kogito.auth.enabled" to "true"
# 2. Remove the "spring.autoconfigure.exclude" property (this will enable the BamoeSpringBootWebSecurityConfig configuration)
# 3. Set "spring.security.oauth2.resourceserver.jwt.issuer-uri" to your Identity Provider URL
kogito.auth.enabled=false

# Uncomment this line and add your own IdP URI when enabling security.
# spring.security.oauth2.resourceserver.jwt.issuer-uri=http://127.0.0.1:8180/realms/your-realm

# Remove this property when enabling security.
spring.autoconfigure.exclude=\
  org.springframework.boot.autoconfigure.security.servlet.SecurityAutoConfiguration,\
  org.springframework.boot.actuate.autoconfigure.security.servlet.ManagementWebSecurityAutoConfiguration

spring.main.allow-bean-definition-overriding=true

